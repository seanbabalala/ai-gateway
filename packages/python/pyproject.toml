[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "siftgate"
version = "2.0.0-alpha.3"
description = "Lightweight Python client scaffold for the SiftGate open-source data plane"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "SiftGate Maintainers" }]
keywords = ["siftgate", "ai-gateway", "openai-compatible", "llm", "routing"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/seanbabalala/ai-gateway"
Documentation = "https://github.com/seanbabalala/ai-gateway/tree/main/packages/python"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
siftgate = ["py.typed"]
