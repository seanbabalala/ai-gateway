# ============================================================
# SiftGate — Docker Compose
# ============================================================
# Quick start:
#   1. cp gateway.config.example.yaml gateway.config.yaml
#   2. cp .env.example .env
#   3. Edit both files with your settings
#   4. docker compose up -d
#   5. Open http://localhost:2099
# ============================================================

services:
  siftgate:
    build: .
    container_name: siftgate
    restart: unless-stopped
    ports:
      - "2099:2099"
    volumes:
      # Mount your config file. Keep it writable so dashboard edits and
      # first-start dashboard password hashing can be persisted.
      - ./gateway.config.yaml:/app/gateway.config.yaml
      # Persist SQLite database across restarts
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2099/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    container_name: siftgate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siftgate}
      POSTGRES_USER: ${POSTGRES_USER:-siftgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siftgate_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siftgate} -d ${POSTGRES_DB:-siftgate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
