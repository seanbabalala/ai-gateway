plugins:
  - path: plugins/guardrails
    required: false
    config:
      enabled: true
      mode: audit
      max_findings_per_request: 50
      pii:
        enabled: true
        action: redact
        entities: [email, api_key, credit_card]
      prompt_injection:
        enabled: true
        action: block
      policies:
        - name: allow-ticket-template
          direction: input
          pattern: "secret project TICKET-[0-9]+"
          action: allow
        - name: block-secret-project
          direction: input
          pattern: "(?i)secret project"
          action: block
        - name: redact-internal-output
          direction: output
          pattern: "(?i)internal only"
          action: redact
          redaction: "[internal]"
      schema:
        enabled: false
        output:
          enabled: false
          action: audit
          trigger_fallback: false
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                type: boolean
      blocked_message: This content is blocked by local guardrails policy.
