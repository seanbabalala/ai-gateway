apiVersion: v1
kind: Secret
metadata:
  name: siftgate-env
  labels:
    app.kubernetes.io/name: siftgate
    app.kubernetes.io/part-of: siftgate
type: Opaque
stringData:
  OPENAI_API_KEY: replace-me
  # Use a bcrypt hash. Leave empty to keep Dashboard auth disabled.
  DASHBOARD_PASSWORD_HASH: ""
  # Optional production backends:
  # DATABASE_URL: postgresql://siftgate:replace-me@postgres:5432/siftgate
  # REDIS_URL: redis://redis:6379
