apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: siftgate
  labels:
    app.kubernetes.io/name: siftgate
    app.kubernetes.io/part-of: siftgate
spec:
  rules:
    - host: siftgate.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: siftgate
                port:
                  name: http
