# server via [mcp:local-docs], or one tool via [mcp:local-docs:search_docs].
# Audit data is metadata-only by default: server, method, tool name, API key,
# Policy Namespace, status, latency, and byte size. Tool input/output, raw headers,
# provider keys, and resolved secret values are not stored.
# ============================================================
# mcp:
#   enabled: false
#   path: /mcp
#   max_recent_calls: 100
#   servers:
#     - id: local-docs
#       name: "Local Docs MCP"
#       description: "Local documentation MCP server"
#       url: "http://localhost:8787/mcp"
#       transport: http_json_rpc
#       timeout_ms: 30000
#       max_request_bytes: 1000000
#       allowed_namespaces: [team-a]
#       headers:
#         Authorization: "Bearer ${env:LOCAL_DOCS_MCP_TOKEN}"
#       tools:
#         - name: search_docs
#           description: "Search local product docs"
#           input_schema:
#             type: object
#
#     # Current remote MCP servers should prefer Streamable HTTP.
#     - id: remote-tools
#       name: "Remote Streamable MCP"
#       description: "Remote MCP server using Streamable HTTP"
#       url: "https://mcp.example.com/mcp"
#       transport: streamable_http
#       timeout_ms: 30000
#       max_request_bytes: 1000000
#       headers:
#         Authorization: "Bearer ${env:REMOTE_MCP_TOKEN}"
#       tools:
#         - name: web_search
#           description: "Search the web"
#           input_schema:
#             type: object
#
#     # Legacy HTTP+SSE MCP servers remain supported for older tooling.
#     - id: legacy-sse-tools
#       name: "Legacy SSE MCP"
#       description: "Legacy MCP server using HTTP+SSE"
#       url: "https://legacy-mcp.example.com/sse"
#       transport: sse
