# ============================================================
# Secret Manager References (optional)
# ============================================================
# Default behavior keeps local env references enabled and external backends
# disabled. Use ${env:OPENAI_API_KEY} in provider api_key fields so local
# Dashboard edits never write resolved provider secrets back to YAML.
#
# Supported reference locations:
#   - nodes[].api_key
#   - nodes[].headers
#   - mcp.servers[].headers / command / args / env / cwd
#   - health/realtime provider auth inherited from node auth fields
#   - control_plane.registration_token
#
# External backends are SDK-less HTTP adapters and must be explicitly enabled.
# Resolved values are never written to logs, call logs, Dashboard config,
# route traces, compatibility results, or catalog overrides.
# ============================================================
# secret_manager:
#   cache_ttl_seconds: 300
#   failure_policy: fail_closed        # fail_closed | fail_open_for_optional
#   backends:
#     env:
#       enabled: true
#     vault:
#       enabled: false
#       address: "${env:VAULT_ADDR}"
#       token: "${env:VAULT_TOKEN}"
#       mount: secret
#       kv_version: 2
#       timeout_ms: 5000
#     aws_sm:
#       enabled: false
#       region: "${env:AWS_REGION:-us-east-1}"
#       # endpoint: "http://localhost:4566" # Optional for LocalStack/mocks
#       access_key_id: "${env:AWS_ACCESS_KEY_ID}"
#       secret_access_key: "${env:AWS_SECRET_ACCESS_KEY}"
#       session_token: "${env:AWS_SESSION_TOKEN:-}"
#       timeout_ms: 5000
#     gcp_sm:
#       enabled: false
#       project_id: "${env:GOOGLE_CLOUD_PROJECT}"
#       access_token: "${env:GCP_SECRET_MANAGER_TOKEN:-}"
#       use_metadata: true
#       timeout_ms: 5000

# ============================================================
# Cluster Mode — optional Redis shared state and multi-instance inventory
# ============================================================
# SiftGate runs as a single local data plane by default. Enable Redis-backed
# cluster mode only when running multiple gateway instances behind a load
# balancer. There is no leader election; every instance handles requests
# independently.
#
# Cluster mode starts when cluster.enabled=true or state.backend=redis.
# GET /cluster/status is available only in that mode. Dashboard also reads
# privacy-safe local status from GET /api/dashboard/cluster.
# ============================================================
# state:
#   backend: memory                 # memory (default) | redis
#   unavailable_policy: fail_open   # default for safety gates when Redis is unavailable
#   redis:
#     url: ${REDIS_URL:-redis://127.0.0.1:6379}
#     prefix: siftgate:state:
#     timeout_ms: 500
#     sync_interval_ms: 2000
#   categories:
#     rate_limit:        { unavailable_policy: fail_open, ttl_seconds: 60 }
#     circuit_breaker:   { unavailable_policy: fail_open, ttl_seconds: 3600 }
#     cache_affinity:    { unavailable_policy: fail_open, ttl_seconds: 1800 }
#     momentum:          { unavailable_policy: fail_open, ttl_seconds: 1800 }
#     prompt_cache:      { unavailable_policy: fail_open, ttl_seconds: 300 }
#     concurrency:       { unavailable_policy: fail_open, ttl_seconds: 120 }
#     health_probe:      { unavailable_policy: fail_open, ttl_seconds: 120 }
#     realtime_session:  { unavailable_policy: fail_open, ttl_seconds: 1800 }
#
# cluster:
#   enabled: false                 # Explicit switch; state.backend=redis also enables it
#   instance_id: ${SIFTGATE_INSTANCE_ID:-}
#   heartbeat_interval_seconds: 10
#   heartbeat_ttl_seconds: 30
#   reload_broadcast: true         # Broadcast successful local reloads to peers
#   redis:
#     url: ${REDIS_URL:-redis://127.0.0.1:6379}
#     prefix: siftgate:state:

# ============================================================
# Nodes — upstream provider endpoints
# ============================================================
# Each node represents one upstream provider account, deployment,
# proxy route, or API endpoint. A node can expose one or more models.
#
# v0.8 includes a local Provider / Model Catalog used by Dashboard
# Add Node and `npm run validate:config`. v0.9 adds price source status and
# cost-routing fallback from the merged built-in + override catalog. v1.0 adds
# 30+ ecosystem providers while keeping the catalog advisory; v0.9.2 can refresh
# OpenRouter into catalog.override.yaml while other providers remain docs-review
# or operator-local workflows. Built-in prices are often marked
# manual_review_required/low confidence, so production billing should still use
# verified values in models_pricing or model_capabilities[].pricing below.
# v1.2 adds prompt-cache-aware routing metadata. Declare prompt_cache/read_cache/
# write_cache when an upstream provider can reuse prompt/context tokens, and add
# cache_read_input/cache_creation_input prices when they differ from normal input.
# v1.4 adds compatibility_profile metadata. Leave it empty for catalog-known
# providers, or set it explicitly for custom gateways/local servers so routing,
# validation, safe probes, and Route Explanation agree on protocol behavior.
#
# Good node IDs/names describe the upstream channel, not a single model:
#   id: openai-main       name: "OpenAI Main Account"
#   id: azure-prod        name: "Azure OpenAI Production"
#   id: local-vllm        name: "Local vLLM"
#
# Chat/Responses/Messages models are listed under nodes[].models.
# Embedding-capable models for /v1/embeddings are listed under
# nodes[].embedding_models and can use a separate embeddings_endpoint.
# Rerank-capable models for /v1/rerank are listed under nodes[].rerank_models
# and can use a separate rerank_endpoint.
# Image, audio, and video models are listed separately under nodes[].image_models,
# nodes[].audio_models, and nodes[].video_models so media endpoints can route, budget, and
# log independently from chat models.
# Batch API proxying uses nodes[].batch_* endpoint overrides when a provider
# needs non-default paths. SiftGate stores batch metadata only, never input or
# output file contents.
# Video support is experimental; compatibility tests only probe endpoint/auth by default.
# Experimental realtime models are listed under nodes[].realtime_models and
# require the top-level realtime.enabled switch below.
# Use model_prefixes when clients should direct-route future model family IDs
# such as "claude-sonnet-..." or "gpt-..." through a stable upstream node ID.
# Supported protocols:
#   - chat_completions  (OpenAI /v1/chat/completions)
#   - responses         (OpenAI /v1/responses)
#   - messages          (Anthropic /v1/messages)
# ============================================================
nodes:
  # ── OpenAI ──
  - id: openai
    name: "OpenAI"
    protocol: chat_completions
    # Optional. If omitted, SiftGate resolves profiles from the Provider Catalog
    # or infers them from protocol/endpoints/model buckets. Examples:
    #   compatibility_profile: openai_compatible
    #   compatibility_profile: [openai_compatible, embedding_compatible, media_generation_sync]
    compatibility_profile: [openai_compatible, openai_responses_compatible, embedding_compatible, media_generation_sync, speech_transcription, speech_tts]
    base_url: "https://api.openai.com"
    endpoint: "/v1/chat/completions"
    embeddings_endpoint: "/v1/embeddings"
    # rerank_endpoint: "/v1/rerank" # Enable only for compatible upstreams/proxies that expose rerank.
    # realtime_endpoint: "/v1/realtime" # Optional ws/wss URL or path for experimental realtime proxy
    images_generations_endpoint: "/v1/images/generations"
    images_edits_endpoint: "/v1/images/edits"
    images_variations_endpoint: "/v1/images/variations"
    audio_transcriptions_endpoint: "/v1/audio/transcriptions"
    audio_translations_endpoint: "/v1/audio/translations"
    audio_speech_endpoint: "/v1/audio/speech"
    # video_generations_endpoint: "/v1/videos/generations" # Experimental async video generation path
    # video_endpoint: "/v1/videos/generations"             # Experimental compatibility-test alias
    # video_status_endpoint: "/v1/videos/:id"              # Optional async video status endpoint
    # video_content_endpoint: "/v1/videos/:id/content"
    # video_cancel_endpoint: "/v1/videos/:id/cancel"
    batch_endpoint: "/v1/batches"
    batch_status_endpoint: "/v1/batches/:id"
    batch_cancel_endpoint: "/v1/batches/:id/cancel"
    batch_result_endpoint: "/v1/files/:id/content"
    # Preferred: runtime secret reference resolved only when requests need it.
    # Legacy startup interpolation still works: api_key: "${OPENAI_API_KEY}"
    api_key: "${env:OPENAI_API_KEY}"
    # Optional: use credentials[] instead of api_key when the same upstream
    # account/node has multiple approved provider keys. SiftGate rotates inside
    # the node before falling back to another node and logs only credential ids.
    # credentials:
    #   - id: primary
    #     api_key: "${env:OPENAI_API_KEY_PRIMARY}"
    #     weight: 1
    #     enabled: true
    #   - id: backup
    #     api_key: "${env:OPENAI_API_KEY_BACKUP}"
    #     weight: 1
    #     enabled: true
    # credential_pool:
    #   enabled: true
    #   strategy: cache_aware           # cache_aware | least_in_flight | weighted_round_robin
    #   sticky_by: agent_session        # none | agent_session | api_key | team | namespace
    #   cooldown_ms: 60000
    #   max_failures: 3
    #   retry_on_status: [429, 500, 502, 503, 504]
    models: ["gpt-4o", "gpt-4o-mini"]
    embedding_models: ["text-embedding-3-small", "text-embedding-3-large"]
    # rerank_models: ["rerank-english-v3"]
    # realtime_models: ["gpt-4o-realtime-preview"]
    image_models: ["gpt-image-1"]
    audio_models: ["gpt-4o-mini-transcribe", "tts-1"]
    # video_models: ["veo-3.1-generate-preview"]
    timeout_ms: 60000
    max_context_tokens: 128000
    structured_output: true
    supports_reasoning: false          # Set true on reasoning-capable models such as o-series/GPT-5 family
    modalities: ["text", "vision"]    # Backward-compatible with image-capable chat models
    endpoints:
      image: "/v1/images/generations"
      image_variation: "/v1/images/variations"
      audio: "/v1/audio/transcriptions"
      audio_translation: "/v1/audio/translations"
      video: "/v1/videos/generations"
      realtime: "/v1/realtime"        # Use wss://... for absolute realtime URLs if needed
      batch: "/v1/batches"
    input_types: ["text", "image", "audio", "video"]
    output_types: ["text", "image", "video", "events"]
    max_file_size: 20000000           # Bytes; applies as a node-level default
    supports_streaming: true
    supports_realtime: false
    supports_rerank: false
    prompt_cache: true                # Provider supports prompt-cache semantics
    read_cache: true                  # Provider reports/charges cache-read input tokens
    write_cache: true                 # Provider can create provider-side prompt cache entries
    model_capabilities:
      gpt-4o:
        modalities: ["text", "image", "audio"]
        input_types: ["text", "image", "audio"]
        output_types: ["text"]
        max_context_tokens: 128000
        structured_output: true
        supports_reasoning: false
        supports_streaming: true
        prompt_cache: true
        read_cache: true
        write_cache: true
        quality_score: 0.9
        pricing:
          input: 2.50
          output: 10.00
          cache_read_input: 1.25       # USD / 1M cache-read input tokens
          cache_creation_input: 2.50   # USD / 1M cache-write input tokens
      gpt-4o-mini:
        modalities: ["text", "image"]
        max_context_tokens: 128000
        structured_output: true
        supports_reasoning: false
        supports_streaming: true
        quality_score: 0.6
        # Optional per-node/model pricing override. If omitted, models_pricing below is used.
        pricing: { input: 0.15, output: 0.60, cache_read_input: 0.075, cache_creation_input: 0.15 }
      # o3:
      #   modalities: ["text"]
      #   max_context_tokens: 200000
      #   structured_output: true
      #   supports_reasoning: true
      text-embedding-3-small:
        modalities: ["text", "embedding"]
        input_types: ["text"]
        output_types: ["embedding"]
        dimensions: [512, 1536]
        pricing: { input: 0.02, output: 0.00 }
      text-embedding-3-large:
        modalities: ["text", "embedding"]
        input_types: ["text"]
        output_types: ["embedding"]
        dimensions: [256, 1024, 3072]
        pricing: { input: 0.13, output: 0.00 }
      # rerank-english-v3:
      #   pricing: { input: 0.80, output: 0.00 }
      # gpt-4o-realtime-preview:
      #   pricing: { input: 5.00, output: 20.00 }
      # veo-3-preview:
      #   pricing: { input: 20.00, output: 0.00 }
      gpt-image-1:
        pricing: { input: 5.00, output: 0.00 }
      gpt-4o-mini-transcribe:
        pricing: { input: 0.60, output: 0.00 }
      tts-1:
        pricing: { input: 15.00, output: 0.00 }
    # Optional per-node upstream concurrency limiter.
    # Applies across all models routed through this node.
    # max_concurrency: 50
    # queue_timeout_ms: 10000
    # queue_policy: wait # wait | fallback | reject
    # Optional undici upstream connection pool. Omit this block to keep the
    # default fetch behavior. HTTP/2 is experimental and disabled by default.
    # connection:
    #   enabled: true
    #   keep_alive: true
    #   pool_size: 10
    #   keep_alive_ms: 60000
    #   headers_timeout_ms: 30000
    #   body_timeout_ms: 300000
    #   http2: false
    # Active health probing is disabled by default. Prefer HEAD/GET against a
    # cheap provider/proxy readiness endpoint. Use lightweight_model only when
    # no readiness endpoint exists; probes send a synthetic 1-token request.
    # health_check:
    #   enabled: false
    #   interval_seconds: 30
    #   timeout_ms: 5000
    #   method: HEAD        # HEAD | GET | POST
    #   path: /healthz      # Defaults to endpoint when omitted
    #   lightweight_model: gpt-4o-mini
    # Unified v0.6 capability schema is optional.
    # Valid modalities: text, vision, image, audio, video, embedding, rerank, realtime.
    # "vision" is kept as the legacy image-input alias and matches "image".
    # Per-model model_capabilities override node-level defaults.
    tags: ["code", "reasoning", "creative"]
    model_aliases:
      gpt4: gpt-4o
      gpt4-mini: gpt-4o-mini
    model_prefixes: ["gpt", "o"]

  # ── Anthropic ──
  - id: anthropic
    name: "Anthropic"
    protocol: messages
    base_url: "https://api.anthropic.com"
    endpoint: "/v1/messages"
    api_key: "${env:ANTHROPIC_API_KEY}"
    auth_type: x-api-key # Anthropic uses x-api-key header
    # Expose a Claude-compatible public name while sending the provider's
    # real model id upstream. This is useful for Claude Code/Desktop or other
    # clients that validate Anthropic-shaped model names.
    models: ["claude-sonnet-4-20250514", "claude-sonnet-4-20250514-ada"]
    upstream_model_aliases:
      claude-sonnet-4-20250514-ada: claude-sonnet-4-20250514
    # Optional compatibility override for Anthropic-compatible gateways that
    # reject content-block arrays inside tool_result.content.
    # request_compatibility:
    #   messages_tool_result_content: string  # native | string
    timeout_ms: 120000
    max_context_tokens: 200000
    structured_output: false
    supports_reasoning: true
    model_capabilities:
      claude-sonnet-4-20250514:
        modalities: ["text", "image"]
        input_types: ["text", "image"]
        output_types: ["text"]
        max_context_tokens: 200000
        structured_output: false
        supports_reasoning: true
        supports_streaming: true
        prompt_cache: true
        read_cache: true
        write_cache: true
        quality_score: 0.9
        pricing:
          input: 3.00
          output: 15.00
          cache_read_input: 0.30
          cache_creation_input: 3.75
    tags: ["code", "backend", "reasoning", "math"]
    model_aliases:
      claude: claude-sonnet-4-20250514
      sonnet: claude-sonnet-4-20250514
    model_prefixes: ["claude"]
    headers:
      anthropic-version: "2023-06-01"

  # ── Google Gemini (native GenerateContent API) ──
  # - id: gemini
  #   name: "Google Gemini"
  #   protocol: gemini
  #   base_url: "https://generativelanguage.googleapis.com"
  #   endpoint: "/v1beta/models/:model:generateContent"
  #   auth_type: x-api-key             # sent as x-goog-api-key for protocol: gemini
  #   api_key: "${GOOGLE_API_KEY}"
  #   models: ["gemini-2.5-pro", "gemini-2.5-flash"]
  #   timeout_ms: 60000
  #   tags: ["code", "frontend", "fast", "long-context", "web-search"]
  #   model_aliases:
  #     gemini-pro: gemini-2.5-pro
  #   model_prefixes: ["gemini"]

  # ── Azure OpenAI ──
  # - id: azure
  #   name: "Azure OpenAI"
  #   protocol: chat_completions
  #   base_url: "${AZURE_OPENAI_ENDPOINT}"
  #   endpoint: "/openai/deployments/gpt-4o/chat/completions?api-version=2024-02-01"
  #   api_key: "${AZURE_OPENAI_API_KEY}"
  #   auth_type: x-api-key             # Azure uses api-key header
  #   models: ["gpt-4o"]
  #   timeout_ms: 60000

  # ── Any OpenAI-compatible API (Ollama, LM Studio, vLLM, etc.) ──
  # - id: local
  #   name: "Local LLM"
  #   protocol: chat_completions
  #   base_url: "http://localhost:11434"
  #   endpoint: "/v1/chat/completions"
  #   api_key: "not-needed"
  #   models: ["llama3"]
  #   timeout_ms: 120000
  #   tags: ["fast", "cheap", "private"]

# ============================================================
# Experimental Realtime Preview — disabled by default
# ============================================================
# This is an OpenAI Realtime-style WebSocket pass-through preview.
# It performs Gateway API key auth, permission checks, connection limits,
# timeout/close cleanup, sanitized logging, and node status summaries.
# It does not parse, transcode, or inspect audio frames locally.
#
# Clients connect with:
#   wss://your-gateway.example/v1/realtime?model=gpt-4o-realtime-preview
#   Authorization: Bearer <gateway-api-key>
#
# Keep disabled unless you have configured nodes[].realtime_models.
# ============================================================
# realtime:
#   enabled: false
#   path: /v1/realtime
#   max_connections: 25
#   max_connections_per_node: 25
#   idle_timeout_ms: 300000
#   upstream_connect_timeout_ms: 10000
#   max_session_ms: 1800000
#   # default_node: openai
#   # default_model: gpt-4o-realtime-preview

# ============================================================
# Routing — How requests are assigned to nodes
# ============================================================
# The scoring engine analyzes each request and assigns a
# complexity tier: simple → standard → complex → reasoning.
# Each tier can use the legacy primary/fallback chain, or the
# v0.2 targets + strategy schema for load balancing.
# Supported strategies: weighted, round_robin, least_latency, random.
# If split is configured on a tier, split remains experiment mode and
# overrides targets until split is removed.
# v1.6 adds optional cache_affinity controls so repeated session traffic can
# bias toward a provider/model with recent confirmed provider cache hits.
# ============================================================
routing:
  # Optional v0.3 automatic routing optimization.
  # Applies only to smart routing (`model: auto`) after permission, health,
  # modality, and context-window constraints are evaluated.
  optimization: balanced # cost | latency | balanced | quality

  tiers:
    simple:
      primary: { node: openai, model: gpt-4o-mini }
      fallbacks:
        - { node: anthropic, model: claude-sonnet-4-20250514 }
    standard:
      primary: { node: openai, model: gpt-4o }
      fallbacks:
        - { node: anthropic, model: claude-sonnet-4-20250514 }
      strategy: weighted
      targets:
        - { node: openai, model: gpt-4o, weight: 70 }
        - { node: anthropic, model: claude-sonnet-4-20250514, weight: 30 }
      # primary/fallbacks remains as a migration-safe fallback shape.
      # targets + strategy controls live selection when targets is present.
    complex:
      primary: { node: anthropic, model: claude-sonnet-4-20250514 }
      fallbacks:
        - { node: openai, model: gpt-4o }
    reasoning:
      primary: { node: anthropic, model: claude-sonnet-4-20250514 }
      fallbacks:
        - { node: openai, model: gpt-4o }

  # Scoring thresholds — tune these to adjust routing sensitivity
  scoring:
    simple_max: -0.1 # Score ≤ -0.1  → simple
    standard_max: 0.08 # Score ≤ 0.08  → standard
    complex_max:
      0.35 # Score ≤ 0.35  → complex
      # Score > 0.35  → reasoning

    # Custom dimension weights (optional) — override default weights
    # Valid dimensions: simpleIndicators, codeGeneration, codeFrontend, codeBackend,
    # formalLogic, technicalTerms, multiStep, analyticalReasoning, tokenCount,
    # toolCount, conversationDepth, constraintDensity, expectedOutputLength, codeToProse
    # weights:
    #   formalLogic: 0.15        # Increase logic weight
    #   codeGeneration: 0.12    # Increase code weight

    # Custom keywords (optional) — inject additional keywords into scoring dimensions
    # custom_keywords:
    #   - pattern: "kubernetes|k8s|helm|istio"
    #     dimension: codeBackend
    #     weight: 1.0
    #   - pattern: "legal|contract|compliance|regulatory"
    #     dimension: analyticalReasoning
    #     weight: 1.0

  # Retry configuration (optional)
  # Controls per-node retry behavior before falling back to the next node.
  # If omitted, no retries are performed (only fallback).
  # retry:
  #   max_retries: 2                     # Max retries per node (default: 0)
  #   backoff_base_ms: 500               # Initial backoff delay (default: 500)
  #   backoff_max_ms: 5000               # Max backoff delay (default: 5000)
  #   retryable_status: [429, 502, 503]  # HTTP codes to retry (default: [429, 502, 503])

  # Fallback policy controls (optional, v0.3)
  # Existing primary/fallback behavior is preserved when this section is omitted.
  # fallback_policy:
  #   immediate_429: true                 # Skip same-node retries on HTTP 429
  #   timeout:
  #     enabled: true
  #     threshold_ms: 30000               # Abort this upstream attempt, then fallback
  #     race_fallback: false              # Starts fallback in parallel; off by default to avoid extra cost
  #   structured_output:
  #     enabled: true                     # Validate JSON for Chat response_format,
  #                                       # Responses text.format, and Messages output_config.format
  #     fallback_on_parse_error: true
  #     fallback_on_schema_error: true
  #   cost_downgrade:
  #     enabled: false
  #     max_estimated_cost_usd: 0.05      # Requires models_pricing entries

  # Domain-based node preference (optional)
  # When the scoring engine detects a domain hint in the request,
  # these nodes are promoted in the routing order.
  domain_preferences:
    frontend: [openai]
    backend: [anthropic, openai]
    math: [anthropic]

  # Session-level provider cache affinity (optional, v1.6)
  # When enabled, repeated requests in the same session can prefer the same
  # node:model after a confirmed provider-side cache hit, as long as the
  # provider cache TTL is still within a safe window.
  # cache_affinity:
  #   enabled: true
  #   min_consecutive_hits: 2  # Require N consecutive routes to the same node:model
  #   bonus_weight: 0.35       # Higher values bias routing more strongly
  #   ttl_safety_margin: 0.8   # Only trust 80% of the published provider cache TTL

# ============================================================
# Budget — Daily usage limits
# ============================================================
budget:
  daily_token_limit: 5000000 # 5M tokens per day
  daily_cost_limit: 50.00 # $50 per day
  alert_threshold: 0.8 # Alert at 80% usage

# ============================================================
# Shadow Traffic — async test-node mirroring (optional)
# ============================================================
# Disabled by default. When enabled, a sampled copy of successful requests is
# sent asynchronously to a test node/model. Shadow failures never fail or slow
# the primary request path, and shadow requests are not billed/logged as user
# calls. Dashboard shows recent sanitized shadow outcomes read-only.
#
# By default SiftGate stores no prompt/input samples and no response samples.
# Enable compare storage only when you intentionally want local comparison
# samples, and review data-retention/privacy requirements first.
# ============================================================
# shadow:
#   enabled: false
#   sample_rate: 0.05        # 5% of eligible successful requests
#   target_node: openai      # Prefer a staging/test node in production
#   target_model: gpt-4o-mini
#   timeout_ms: 30000
#   max_recent_results: 100
#   compare:
#     store_prompts: false
#     store_responses: false
#     sample_max_chars: 4000  # Samples are redacted and truncated when explicit storage is enabled

# ============================================================
# Alerts — local webhook alerting (optional)
# ============================================================
# Disabled by default. Alert delivery is asynchronous and payloads are
# sanitized: prompts, responses, provider API keys, and raw headers are
# never included.
# ============================================================
# alerts:
#   enabled: false
#   history_size: 50
#   channels:
#     - type: webhook
#       name: ops
#       url: "${ALERT_WEBHOOK_URL}"
#       headers:
#         Authorization: "Bearer ${ALERT_WEBHOOK_TOKEN}"
#       events:
#         - budget_threshold
#         - budget_exceeded
#         - node_down
#         - node_recovered
#         - circuit_open
#         - circuit_close
#         - error_spike
#         - latency_spike
#         - quality_gate_failed
#       debounce_seconds: 300
#       retry:
#         attempts: 3
#         backoff_ms: 1000
#         timeout_ms: 5000
#   error_spike:
#     enabled: true
#     window_seconds: 300
#     min_requests: 20
#     error_rate: 0.1
#   latency_spike:
#     enabled: true
#     window_seconds: 300
#     min_requests: 20
#     p95_ms: 10000

# ============================================================
# Intelligence Loop — optional cost optimizer, token prediction, eval metadata,
# and quality gates
# ============================================================
# Disabled by default. When enabled, the v2.2 intelligence loop records
# privacy-safe route evidence and can apply only explicitly configured actions.
#
# Privacy boundary:
# - no prompts, responses, raw provider headers, provider keys, tool payloads,
#   media bytes, hidden reasoning text, source code, diffs, or resolved secrets
#   are stored by these features by default
# - async_eval is metadata-only by default
# - quality_gate never retries or falls back after streaming bytes have started
# - endpoint/model/node/API-key policy, budgets, RBAC, and workspace scope remain
#   authoritative
# ============================================================
# intelligence:
#   cost_optimizer:
#     enabled: false
#     action: evidence_only           # evidence_only | optimize
#     objective: balanced             # cost | balanced | latency | quality
#     history_window_hours: 24
#     min_samples: 5
#     min_savings_ratio: 0.05
#     max_latency_penalty_ratio: 0.5
#     max_quality_penalty: 0.15
#     allow_quality_critical_downgrade: false
#   token_prediction:
#     enabled: false
#     budget_policy: observe          # observe | reject | downgrade
#     near_limit_ratio: 0.9
#     allow_quality_critical_downgrade: false
#   async_eval:
#     enabled: false
#     sample_rate: 0                  # 0..1, metadata queue only by default
#     dimensions: [latency, toxicity, relevance, format]
#     metadata_only: true
#     max_recent_jobs: 200
#   quality_gate:
#     enabled: false
#     rules:
#       - id: critical-coding
#         enabled: true
#         tiers: [complex, reasoning]
#         agent_virtual_models: [coding-deep, coding-security]
#         require_text: true
#         min_output_tokens: 16
#         max_latency_ms: 30000
#         fail_on_stop_reasons: [max_tokens]
#         actions: [fallback, alert]  # retry | fallback | alert

# ============================================================
# External Log Sinks — optional call-log export
# ============================================================
# Disabled by default. Sink delivery is asynchronous and never replaces
# the local SQLite/Postgres call_logs table. Exported records are sanitized:
# prompts, responses, provider keys, and raw auth headers are not included.
# ============================================================
# logging:
#   enabled: false
#   sinks:
#     - type: file
#       name: local-jsonl
#       path: ./data/calls.jsonl
#       batch_size: 100
#       flush_interval_ms: 5000
#       max_queue: 10000
#       overflow: drop_oldest # drop_oldest | drop_newest
#       fields: [request_id, timestamp, node_id, model, status_code, latency_ms, cost_usd]
#     - type: webhook
#       name: ops-pipeline
#       url: "${LOG_SINK_WEBHOOK_URL}"
#       headers:
#         Authorization: "Bearer ${LOG_SINK_WEBHOOK_TOKEN}"
#       batch_size: 100
#       flush_interval_ms: 5000
#       retry:
#         attempts: 3
#         backoff_ms: 1000
#         timeout_ms: 5000
#     # Interface placeholders for future/exporter-specific implementations:
#     # - type: s3
#     #   enabled: false
#     #   bucket: siftgate-call-logs
#     #   region: us-east-1
#     #   prefix: production/
#     # - type: elasticsearch
#     #   enabled: false
#     #   url: "http://elastic:9200"
#     #   index: siftgate-call-logs

# ============================================================
# Model Pricing — Cost per 1M tokens (USD)
# ============================================================
# Used to calculate per-request costs and enforce budget limits.
# Explicit entries here override Provider Catalog fallback pricing.
# Add entries for every production model ID listed in your nodes above.
# v1.4 also accepts source-governance metadata and aliases such as
# input_per_1m_tokens/output_per_1m_tokens. Legacy input/output remains valid.
models_pricing:
  gpt-4o: { input: 2.50, output: 10.00 }
  gpt-4o-mini: { input: 0.15, output: 0.60 }
  claude-sonnet-4-20250514: { input: 3.00, output: 15.00 }
  text-embedding-3-small: { input: 0.02, output: 0.00 }
  text-embedding-3-large: { input: 0.13, output: 0.00 }
  # rerank-english-v3: { input: 0.80, output: 0.00 }
  gpt-image-1: { input: 5.00, output: 0.00 }
  gpt-4o-mini-transcribe: { input: 0.60, output: 0.00 }
  tts-1: { input: 15.00, output: 0.00 }
  # gemini-2.5-pro:          { input: 1.25, output: 10.00 }

# ============================================================
# Shared State Backend — optional multi-instance runtime state
# ============================================================
# Defaults to local memory so a single open-source gateway works without
# extra services. Set backend: redis when running multiple gateway replicas
# that should share circuit breakers, rate limits, cache affinity, route
# momentum, prompt cache entries, concurrency summaries, active health probe
# summaries, and realtime/session metadata.
# ============================================================
# state:
#   backend: memory              # memory | redis (default: memory)
#   unavailable_policy: fail_open # fail_open | fail_closed when Redis is unavailable
#   redis:
#     url: ${REDIS_URL:-redis://localhost:6379}
#     prefix: siftgate:state:
#     timeout_ms: 500
#     sync_interval_ms: 2000      # Circuit/momentum local mirror refresh
#   categories:
#     rate_limit:        { ttl_seconds: 60 }
#     circuit_breaker:   { ttl_seconds: 3600 }
#     cache_affinity:    { ttl_seconds: 1800 }
#     momentum:          { ttl_seconds: 1800 }
#     prompt_cache:      { ttl_seconds: 300 }
#     concurrency:       { ttl_seconds: 120 }
#     health_probe:      { ttl_seconds: 120 }
#     realtime_session:  { ttl_seconds: 1800 }

# ============================================================
# Cache — Prompt response caching
# ============================================================
# Caches deterministic responses (temperature=0). With state.backend: redis,
# cache entries are stored as shared Redis String+TTL values.
# Identical requests return instantly from cache without hitting
# the upstream provider, saving tokens and reducing latency.
# ============================================================
# cache:
#   enabled: true              # Master switch (default: false)
#   ttl_seconds: 300           # Cache TTL in seconds (default: 300 = 5 min)
#   max_entries: 1000          # Max cached responses, LRU eviction (default: 1000)
#   exclude_tool_use: true     # Don't cache tool_use responses (default: true)
#   stream_cache:
#     enabled: false           # Opt-in stream cache + SSE replay (default: false)

# ============================================================
# Semantic Cache v2 — optional embedding-similarity cache
# ============================================================
# Disabled by default. v2.7 keeps a local memory hashed-vector backend as the
# production-safe default and reserves Redis/vector backends for preview use.
# It stores only embedding/hash/metadata by default. Replayable response bodies
# require store_responses: true and, by default, the per-request header
# x-siftgate-semantic-store-response: true.
# ============================================================
# semantic_cache:
#   enabled: false             # Master switch (default: false)
#   backend: memory            # memory default; redis/vector are preview backends
#   similarity_threshold: 0.92 # Cosine threshold for a metadata match
#   ttl_seconds: 3600          # Entry TTL
#   max_entries: 500           # Local LRU cap
#   vector_dimensions: 256     # Hashed-vector dimensions
#   store_responses: false     # Privacy-safe default: no replay bodies
#   max_response_bytes: 65536  # Cap when store_responses=true
#   isolation: workspace_api_key_model
#   response_storage_requires_header: true

# ============================================================
# Semantic Controls — optional v2.7 semantic control plane
# ============================================================
# Disabled by default. Enables metadata-only Prompt Registry, context-window
# evidence, intent classification, and Guardrails v2 findings for routing and
# Dashboard analytics. It does not store prompt/response content by default.
# ============================================================
# semantic_platform:
#   enabled: false
#   prompt_registry:
#     enabled: false
#     store_template_content: false
#     max_versions_per_key: 20
#   context_optimizer:
#     enabled: false
#     strategy: metadata_only   # metadata_only | trim | summarize
#     max_context_ratio: 0.8
#     allow_content_mutation: false
#   intent_classification:
#     enabled: false
#     categories:
#       - coding
#       - task
#       - security
#       - reasoning
#       - creative
#       - multimodal
#       - analysis
#       - general
#     min_confidence: 0.5
#   guardrails_v2:
#     enabled: false
#     metadata_only: true
#     input:
#       enabled: false
#       pii: true
#       toxicity: true
#       jailbreak: true
#       action: observe         # observe | block | alert
#     output:
#       enabled: false
#       pii: true
#       toxicity: true
#       jailbreak: true
#       action: observe

# ============================================================
# Embedding Batching — optional /v1/embeddings request coalescing
# ============================================================
# Disabled by default. When enabled, small same-target embedding
# requests are collected for a short window, sent upstream as one
# batch, then split back into per-request responses.
# ============================================================
# embedding_batching:
#   enabled: false             # Master switch (default: false)
#   window_ms: 10              # Local collection window (default: 10)
#   max_batch_size: 64         # Max upstream input items per batch
#   max_input_items: 8         # Only batch small requests with <= this many items
#   max_queue: 1000            # Max queued local embedding requests
#   timeout_ms: 10000          # Per-request queue/dispatch timeout

# ============================================================
# Runtime Plugins — optional OSS Data Plane extensions
# ============================================================
# Official plugins live in plugins/ and are built into
# dist-runtime-plugins for production Docker images. They are safe
# no-ops by default unless enabled in their plugin config.
#
# Safety defaults:
# - redis-cache sends only hashed cache keys; response storage requires
#   explicit store_responses: true.
# - analytics-sink exports sanitized call-log metadata only.
# - request-transform runs local rewrites only.
# - guardrails runs local PII, secret/token, prompt-injection, jailbreak,
#   unsafe URL, schema, tool-call, and policy checks. Optional webhook export
#   sends finding metadata only; prompt/response text, raw headers, provider
#   keys, and media bytes are never sent by default.
# ============================================================
# plugins:
#   - path: plugins/request-transform
#     required: false
#     config:
#       enabled: true
#       rules:
#         - name: deterministic-tools
#           when:
#             has_tools: true
#           set:
#             temperature: 0
#
#   - path: plugins/guardrails
#     required: false
#     config:
#       enabled: true
#       mode: audit
#       max_findings_per_request: 50
#       pii:
#         enabled: true
#         action: redact
#         entities: [email, api_key, credit_card, ip_address, iban]
#       secrets:
#         enabled: true
#         action: webhook
#       prompt_injection:
#         enabled: true
#         action: block
#       jailbreak:
#         enabled: true
#         action: block
#       unsafe_url:
#         enabled: true
#         action: audit
#         block_private_ips: true
#       tool_call_policy:
#         enabled: true
#         action: block
#         allowed_tools: [safe_lookup]
#         require_known_tools: true
#       policies:
#         - name: block-secret-project
#           direction: input
#           pattern: "(?i)secret project"
#           action: block
#         - name: webhook-high-risk-policy
#           direction: both
#           pattern: "(?i)credential dump"
#           action: webhook
#       schema:
#         enabled: false
#         strict: true
#         output:
#           enabled: false
#           action: audit
#           trigger_fallback: false
#       webhook:
#         enabled: false
#         url: "https://hooks.example.com/siftgate/guardrails"
#         include_actions: [webhook, block]
#         debounce_seconds: 300
#         timeout_ms: 5000
#         max_queue: 100
#         drop_policy: drop_newest
#         retry:
#           attempts: 3
#           backoff_ms: 1000
#
#   - path: plugins/analytics-sink
#     required: false
#     config:
#       enabled: false
#       endpoint: ${ANALYTICS_SINK_URL:-}
#
#   - path: plugins/redis-cache
#     required: false
#     config:
#       enabled: false
#       url: ${REDIS_URL:-redis://127.0.0.1:6379}
#       store_responses: false

# ============================================================
# Evaluation Framework — local primary/candidate experiment reports
# ============================================================
# Disabled-by-default preview controls for local LLM-as-judge reports.
# Prompt/response previews are not stored unless both this config and the
# individual run request explicitly opt in. Previews are redacted/truncated.
# ============================================================
# evaluation:
#   enabled: false
#   store_samples: false
#   max_sample_chars: 500
#   retention_days: 30
#   judge_model: gpt-4o-mini

# ============================================================
# Telemetry — OpenTelemetry and Prometheus metrics
# ============================================================
# Disabled by default. When enabled, SiftGate starts the existing
# OpenTelemetry SDK and exposes Prometheus metrics at
# http://localhost:9464/metrics unless prometheus_port is changed.
# Business metric labels avoid API key IDs/names, prompts, responses,
# provider keys, and raw auth headers.
# ============================================================
# telemetry:
#   enabled: false
#   service_name: "siftgate"
#   traces:
#     endpoint: "http://localhost:4318/v1/traces"
#     sample_rate: 1.0
#   metrics:
#     prometheus_port: 9464

# ============================================================
# Connected Gateway — Cloud Control Plane (optional)
# ============================================================
# Disabled by default. When enabled, this data plane can register
# with SiftGate Cloud for fleet health, policy sync, and
# privacy-preserving metadata analytics. AI requests, prompts,
# responses, and provider API keys do not pass through the control plane.
# Local Cloud API during development: http://localhost:3100
# Production Cloud API placeholder: https://api.siftgate.dev
# ============================================================
# control_plane:
#   enabled: false
#   url: "http://localhost:3100"
#   gateway_id: "gw_prod_us"
#   registration_token: "${GATEWAY_REGISTRATION_TOKEN}"
#   telemetry:
#     upload_interval_seconds: 30
#     include_prompt: false
#     include_response: false
