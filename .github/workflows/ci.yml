name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend, Docs, E2E, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check public repository boundary
        run: npm run public:check

      - name: Check docs
        run: npm run docs:check

      - name: Lint backend and scripts
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Validate example config
        run: npm run validate:config -- --config gateway.config.example.yaml

      - name: Validate Kubernetes manifests
        run: npm run validate:k8s

      - name: Check release metadata
        run: npm run release:check

      - name: Check provider registry
        run: npm run provider-registry:check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm test

      - name: Build frontend
        run: npm run build

  sdk:
    name: SDKs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript SDK
        run: npm run build:sdk

      - name: Test TypeScript SDK
        run: npm run test:sdk

      - name: Typecheck TypeScript SDK
        run: npm run typecheck:sdk

      - name: Test Python SDK
        run: npm run test:python-sdk
