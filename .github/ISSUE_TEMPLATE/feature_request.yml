name: Feature request
description: Suggest an open-source Data Plane improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like SiftGate to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Routing
        - Provider Catalog
        - Dashboard
        - Security
        - Deployment
        - SDKs
        - Plugins
        - Documentation
        - Other
    validations:
      required: true
