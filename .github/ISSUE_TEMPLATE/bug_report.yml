name: Bug report
description: Report a reproducible SiftGate issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v2.8.x or commit hash"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use sanitized config and sample requests only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: hygiene
    attributes:
      label: Safety checklist
      options:
        - label: I removed provider keys, Gateway API keys, raw auth headers, prompts, responses, and private URLs.
          required: true
