<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">SiftGate AI traffic data plane</title>
  <desc id="desc">A product-style technical hero diagram showing SiftGate as a self-hosted AI traffic data plane between clients, policy controls, credential pools, route evidence, budgets, and upstream AI providers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061311"/>
      <stop offset="0.48" stop-color="#0b1716"/>
      <stop offset="1" stop-color="#11160b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2722"/>
      <stop offset="0.58" stop-color="#12312c"/>
      <stop offset="1" stop-color="#1a2a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d7a8"/>
      <stop offset="0.5" stop-color="#7ddfff"/>
      <stop offset="1" stop-color="#d7f67a"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d7a8" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#7ddfff" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#d7f67a" stop-opacity="0.24"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-25%" y="-30%" width="150%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22d7a8" flood-opacity="0.36"/>
    </filter>
    <style>
      .font { font-family: "Avenir Next", "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif; }
      .eyebrow { font-size: 15px; font-weight: 850; letter-spacing: 0.16em; fill: #22d7a8; }
      .title { font-size: 50px; font-weight: 900; letter-spacing: 0; fill: #f6fffb; }
      .subtitle { font-size: 20px; fill: #b9cbc6; }
      .small { font-size: 15px; fill: #9fb2ad; }
      .tiny { font-size: 13px; fill: #87a09a; }
      .label { font-size: 18px; font-weight: 850; fill: #f6fffb; }
      .metric { font-size: 34px; font-weight: 900; fill: #f6fffb; }
      .green { fill: #22d7a8; }
      .aqua { fill: #7ddfff; }
      .lime { fill: #d7f67a; }
      .card { fill: rgba(255,255,255,0.052); stroke: rgba(236,255,249,0.14); stroke-width: 1; }
      .soft { fill: rgba(255,255,255,0.035); stroke: rgba(236,255,249,0.10); stroke-width: 1; }
      .chip { fill: rgba(34,215,168,0.11); stroke: rgba(34,215,168,0.42); stroke-width: 1; }
      .chip2 { fill: rgba(125,223,255,0.10); stroke: rgba(125,223,255,0.34); stroke-width: 1; }
      .chip3 { fill: rgba(215,246,122,0.10); stroke: rgba(215,246,122,0.34); stroke-width: 1; }
      .wire { fill: none; stroke: url(#wire); stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1440" height="860" fill="url(#bg)"/>
  <rect width="1440" height="860" fill="url(#grid)" opacity="0.82"/>
  <path d="M72 260H1368" stroke="url(#accent)" stroke-width="2" opacity="0.42"/>
  <path d="M72 778H1368" stroke="#ffffff" stroke-opacity="0.08"/>

  <g transform="translate(72 74)">
    <text class="font eyebrow" x="0" y="0">SELF-HOSTED AI TRAFFIC DATA PLANE</text>
    <text class="font title" x="0" y="66">Govern every model call</text>
    <text class="font title" x="0" y="122">before it leaves your stack.</text>
    <text class="font subtitle" x="0" y="170">One local control point for apps, coding agents, MCP tools, provider keys,</text>
    <text class="font subtitle" x="0" y="198">routing, budgets, cache, and evidence.</text>
  </g>

  <g transform="translate(72 304)" filter="url(#shadow)">
    <rect x="0" y="0" width="1296" height="304" rx="34" fill="rgba(255,255,255,0.032)" stroke="rgba(236,255,249,0.14)" stroke-width="1.2"/>

    <g transform="translate(44 54)">
      <rect class="card" x="0" y="0" width="260" height="196" rx="28"/>
      <text class="font eyebrow" x="24" y="36">CLIENTS</text>
      <text class="font label" x="24" y="72">Apps, SDKs, agents</text>
      <text class="font small" x="24" y="103">Cursor, Claude Code, Codex</text>
      <text class="font small" x="24" y="128">Cline, Roo Code, MCP tools</text>
      <text class="font small" x="24" y="153">Batch jobs and product apps</text>
    </g>

    <path class="wire" d="M334 152 C398 152 428 152 486 152"/>

    <g transform="translate(486 38)" filter="url(#glow)">
      <rect x="0" y="0" width="326" height="228" rx="34" fill="url(#panel)" stroke="url(#accent)" stroke-width="2"/>
      <text class="font eyebrow" x="34" y="44">SIFTGATE</text>
      <text class="font label" x="34" y="82">Policy, routing, credentials</text>
      <text class="font small green" x="34" y="116">Gateway API keys and namespaces</text>
      <text class="font small aqua" x="34" y="143">Compatibility and route evidence</text>
      <text class="font small lime" x="34" y="170">Cache-aware provider key pools</text>
      <text class="font tiny" x="34" y="202">Metadata-only operational memory by default</text>
    </g>

    <path class="wire" d="M812 152 C874 152 906 152 962 152"/>

    <g transform="translate(962 54)">
      <rect class="card" x="0" y="0" width="290" height="196" rx="28"/>
      <text class="font eyebrow" x="24" y="36">PROVIDERS</text>
      <text class="font label" x="24" y="72">Model APIs and runtimes</text>
      <text class="font small" x="24" y="103">OpenAI, Anthropic, Gemini</text>
      <text class="font small" x="24" y="128">Azure, Bedrock, OpenRouter</text>
      <text class="font small" x="24" y="153">local models, media, audio</text>
    </g>
  </g>

  <g transform="translate(72 662)">
    <rect class="chip" x="0" y="0" width="196" height="44" rx="22"/>
    <text class="font small green" x="98" y="28" text-anchor="middle" font-weight="850">BYOK governance</text>
    <rect class="chip2" x="216" y="0" width="210" height="44" rx="22"/>
    <text class="font small aqua" x="321" y="28" text-anchor="middle" font-weight="850">Route explanation</text>
    <rect class="chip3" x="446" y="0" width="236" height="44" rx="22"/>
    <text class="font small lime" x="564" y="28" text-anchor="middle" font-weight="850">Cache-aware key pools</text>
    <rect class="chip" x="702" y="0" width="218" height="44" rx="22"/>
    <text class="font small green" x="811" y="28" text-anchor="middle" font-weight="850">Metadata-only logs</text>
    <rect class="chip2" x="940" y="0" width="230" height="44" rx="22"/>
    <text class="font small aqua" x="1055" y="28" text-anchor="middle" font-weight="850">Kubernetes-ready</text>
  </g>

  <g transform="translate(72 738)">
    <rect class="soft" x="0" y="0" width="260" height="90" rx="24"/>
    <text class="font metric green" x="24" y="42">50+</text>
    <text class="font label" x="96" y="40">provider profiles</text>
    <text class="font tiny" x="96" y="63">catalog, pricing, compatibility</text>

    <rect class="soft" x="284" y="0" width="282" height="90" rx="24"/>
    <text class="font metric aqua" x="308" y="42">10+</text>
    <text class="font label" x="388" y="40">traffic surfaces</text>
    <text class="font tiny" x="388" y="63">chat, responses, MCP, media</text>

    <rect class="soft" x="590" y="0" width="338" height="90" rx="24"/>
    <text class="font metric lime" x="614" y="42">0</text>
    <text class="font label" x="666" y="40">content retention</text>
    <text class="font tiny" x="666" y="63">no prompts, responses, payloads, or keys</text>

    <rect class="soft" x="952" y="0" width="344" height="90" rx="24"/>
    <text class="font metric green" x="976" y="42">1</text>
    <text class="font label" x="1028" y="40">local control point</text>
    <text class="font tiny" x="1028" y="63">policy, cost, routing, audit, operations</text>
  </g>
</svg>
