<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1110" viewBox="0 0 1440 1110" role="img" aria-labelledby="title desc">
  <title id="title">SiftGate competitive positioning matrix</title>
  <desc id="desc">A polished competitive scorecard comparing SiftGate with Manifest, One API, and New API across product center, protocol surface, agent governance, routing evidence, provider credential pools, governance, privacy, and production operations.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1110"/>
      <stop offset="0.52" stop-color="#101817"/>
      <stop offset="1" stop-color="#15170f"/>
    </linearGradient>
    <linearGradient id="siftPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102f28"/>
      <stop offset="0.58" stop-color="#103833"/>
      <stop offset="1" stop-color="#1c321d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42f2b8"/>
      <stop offset="0.45" stop-color="#8fe8ff"/>
      <stop offset="1" stop-color="#d7f67a"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .font { font-family: "Avenir Next", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; }
      .eyebrow { font-size: 16px; font-weight: 800; letter-spacing: 0.16em; fill: #4ff1bd; }
      .title { font-size: 46px; font-weight: 900; letter-spacing: 0; fill: #f4fbf8; }
      .subtitle { font-size: 19px; fill: #b9c9c5; }
      .fine { font-size: 14px; fill: #8ea09b; }
      .small { font-size: 16px; fill: #aebfba; }
      .body { font-size: 18px; fill: #d7e5df; }
      .label { font-size: 20px; font-weight: 800; fill: #f5fbf8; }
      .cellTitle { font-size: 18px; font-weight: 850; fill: #f6fffb; }
      .cellCopy { font-size: 14px; fill: #a9bbb6; }
      .green { fill: #42f2b8; }
      .aqua { fill: #8fe8ff; }
      .cream { fill: #f4fbf8; }
      .muted { fill: #8ea09b; }
      .card { fill: rgba(255,255,255,0.045); stroke: rgba(226,255,247,0.13); stroke-width: 1; }
      .card2 { fill: rgba(255,255,255,0.035); stroke: rgba(226,255,247,0.10); stroke-width: 1; }
      .siftCard { fill: url(#siftPanel); stroke: #42f2b8; stroke-width: 1.8; }
      .row { fill: rgba(255,255,255,0.032); stroke: rgba(226,255,247,0.075); stroke-width: 1; }
      .rowAlt { fill: rgba(255,255,255,0.046); stroke: rgba(226,255,247,0.085); stroke-width: 1; }
      .pill { fill: rgba(66,242,184,0.12); stroke: rgba(66,242,184,0.56); stroke-width: 1; }
      .pillSoft { fill: rgba(143,232,255,0.10); stroke: rgba(143,232,255,0.35); stroke-width: 1; }
      .pillWarm { fill: rgba(215,246,122,0.10); stroke: rgba(215,246,122,0.35); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="1110" fill="url(#page)"/>
  <rect width="1440" height="1110" fill="url(#grid)" opacity="0.65"/>
  <path d="M64 150H1376" stroke="url(#accent)" stroke-width="1.5" opacity="0.42"/>
  <path d="M64 1038H1376" stroke="#ffffff" stroke-opacity="0.10"/>

  <g transform="translate(64 58)">
    <text class="font eyebrow" x="0" y="0">COMPETITIVE POSITIONING</text>
    <text class="font title" x="0" y="58">Gateway, router, or data plane?</text>
    <text class="font subtitle" x="0" y="96">SiftGate is designed for teams that need policy, routing, provider key pooling,</text>
    <text class="font subtitle" x="0" y="124">evidence, agent controls, and production operations in one self-hosted layer.</text>
    <g transform="translate(1056 24)">
      <rect x="0" y="0" width="256" height="82" rx="20" fill="rgba(66,242,184,0.08)" stroke="rgba(66,242,184,0.34)"/>
      <text class="font fine green" x="24" y="30">DEFAULT POSTURE</text>
      <text class="font label" x="24" y="58">Metadata-only</text>
    </g>
  </g>

  <g transform="translate(64 184)" filter="url(#softShadow)">
    <rect class="siftCard" x="0" y="0" width="386" height="126" rx="24"/>
    <text class="font label" x="28" y="40">SiftGate</text>
    <text class="font small green" x="28" y="70">Self-hosted AI traffic data plane</text>
    <text class="font cellCopy" x="28" y="100">Governance, routing, key pools, agents, evidence</text>
    <rect x="277" y="28" width="78" height="30" rx="15" fill="url(#accent)"/>
    <text class="font fine" x="316" y="48" text-anchor="middle" fill="#071a15" font-weight="900">CORE</text>
  </g>

  <g transform="translate(484 184)" filter="url(#softShadow)">
    <rect class="card" x="0" y="0" width="280" height="126" rx="24"/>
    <text class="font label" x="24" y="40">Manifest</text>
    <text class="font small aqua" x="24" y="70">Cost-aware smart router</text>
    <text class="font cellCopy" x="24" y="100">Fast path for agents and apps</text>
  </g>

  <g transform="translate(792 184)" filter="url(#softShadow)">
    <rect class="card" x="0" y="0" width="280" height="126" rx="24"/>
    <text class="font label" x="24" y="40">One API</text>
    <text class="font small aqua" x="24" y="70">API management panel</text>
    <text class="font cellCopy" x="24" y="100">Users, tokens, channels, quota</text>
  </g>

  <g transform="translate(1100 184)" filter="url(#softShadow)">
    <rect class="card" x="0" y="0" width="276" height="126" rx="24"/>
    <text class="font label" x="24" y="40">New API</text>
    <text class="font small aqua" x="24" y="70">Aggregation and distribution hub</text>
    <text class="font cellCopy" x="24" y="100">Conversion, billing, admin workflows</text>
  </g>

  <g transform="translate(64 350)">
    <rect x="0" y="0" width="1312" height="648" rx="28" fill="rgba(255,255,255,0.028)" stroke="rgba(226,255,247,0.12)"/>
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="1312" height="66" rx="28" fill="rgba(255,255,255,0.055)"/>
      <text class="font fine muted" x="28" y="40">DIMENSION</text>
      <text class="font fine green" x="352" y="40">SIFTGATE</text>
      <text class="font fine muted" x="724" y="40">MANIFEST</text>
      <text class="font fine muted" x="952" y="40">ONE API</text>
      <text class="font fine muted" x="1180" y="40">NEW API</text>
    </g>

    <g transform="translate(0 66)">
      <rect class="rowAlt" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Product center</text>
      <text class="font cellCopy" x="28" y="54">What the project is built around</text>
      <text class="font cellTitle" x="352" y="31">Data plane</text>
      <text class="font cellCopy" x="352" y="54">Policy + routing + evidence</text>
      <text class="font cellTitle" x="724" y="31">Smart router</text>
      <text class="font cellCopy" x="724" y="54">Cost-aware routing</text>
      <text class="font cellTitle" x="952" y="31">API panel</text>
      <text class="font cellCopy" x="952" y="54">Channels + quota</text>
      <text class="font cellTitle" x="1180" y="31">Model hub</text>
      <text class="font cellCopy" x="1180" y="54">Distribution + billing</text>
    </g>

    <g transform="translate(0 138)">
      <rect class="row" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Protocol surface</text>
      <text class="font cellCopy" x="28" y="54">Ingress beyond basic chat</text>
      <rect class="pill" x="352" y="19" width="116" height="30" rx="15"/>
      <text class="font fine green" x="410" y="39" text-anchor="middle">BROAD</text>
      <rect class="pillSoft" x="724" y="19" width="116" height="30" rx="15"/>
      <text class="font fine aqua" x="782" y="39" text-anchor="middle">FOCUSED</text>
      <rect class="pillSoft" x="952" y="19" width="142" height="30" rx="15"/>
      <text class="font fine aqua" x="1023" y="39" text-anchor="middle">CHANNEL BASED</text>
      <rect class="pillWarm" x="1180" y="19" width="116" height="30" rx="15"/>
      <text class="font fine" x="1238" y="39" text-anchor="middle" fill="#d7f67a">BROAD</text>
    </g>

    <g transform="translate(0 210)">
      <rect class="rowAlt" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Agent and MCP controls</text>
      <text class="font cellCopy" x="28" y="54">Coding agents and tool calls</text>
      <text class="font cellTitle" x="352" y="31">Native profiles</text>
      <text class="font cellCopy" x="352" y="54">Coding agents + MCP gateway</text>
      <text class="font cellTitle" x="724" y="31">Agent-first</text>
      <text class="font cellCopy" x="724" y="54">Router for agents/apps</text>
      <text class="font cellTitle" x="952" y="31">Generic API</text>
      <text class="font cellCopy" x="952" y="54">Token/channel model</text>
      <text class="font cellTitle" x="1180" y="31">App tools</text>
      <text class="font cellCopy" x="1180" y="54">Editor integrations</text>
    </g>

    <g transform="translate(0 282)">
      <rect class="row" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Routing intelligence</text>
      <text class="font cellCopy" x="28" y="54">Decision model</text>
      <text class="font cellTitle" x="352" y="31">Explainable</text>
      <text class="font cellCopy" x="352" y="54">Traces, filters, cost, health</text>
      <text class="font cellTitle" x="724" y="31">Cost-first</text>
      <text class="font cellCopy" x="724" y="54">Cheapest capable model</text>
      <text class="font cellTitle" x="952" y="31">Channel-first</text>
      <text class="font cellCopy" x="952" y="54">Priority + weights</text>
      <text class="font cellTitle" x="1180" y="31">Channel-first</text>
      <text class="font cellCopy" x="1180" y="54">Failover + conversion</text>
    </g>

    <g transform="translate(0 354)">
      <rect class="rowAlt" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Governance model</text>
      <text class="font cellCopy" x="28" y="54">Policy and budget hierarchy</text>
      <text class="font cellTitle" x="352" y="31">Workspace policy</text>
      <text class="font cellCopy" x="352" y="54">Key, Team, Namespace, model</text>
      <text class="font cellTitle" x="724" y="31">Usage limits</text>
      <text class="font cellCopy" x="724" y="54">Budgets and providers</text>
      <text class="font cellTitle" x="952" y="31">Quota model</text>
      <text class="font cellCopy" x="952" y="54">Users, tokens, channels</text>
      <text class="font cellTitle" x="1180" y="31">Billing model</text>
      <text class="font cellCopy" x="1180" y="54">Users, groups, recharge</text>
    </g>

    <g transform="translate(0 426)">
      <rect class="row" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Credential pools</text>
      <text class="font cellCopy" x="28" y="54">Multiple upstream keys per node</text>
      <text class="font cellTitle" x="352" y="31">First-class</text>
      <text class="font cellCopy" x="352" y="54">Rotation, sticky, cooldown</text>
      <text class="font cellTitle" x="724" y="31">Provider keys</text>
      <text class="font cellCopy" x="724" y="54">Not the ops center</text>
      <text class="font cellTitle" x="952" y="31">Channels</text>
      <text class="font cellCopy" x="952" y="54">Capacity via channels</text>
      <text class="font cellTitle" x="1180" y="31">Channels</text>
      <text class="font cellCopy" x="1180" y="54">Failover via config</text>
    </g>

    <g transform="translate(0 498)">
      <rect class="rowAlt" x="0" y="0" width="1312" height="72"/>
      <text class="font label" x="28" y="31">Operations evidence</text>
      <text class="font cellCopy" x="28" y="54">What operators can inspect</text>
      <text class="font cellTitle" x="352" y="31">First-class</text>
      <text class="font cellCopy" x="352" y="54">Routes, credential hits, audit</text>
      <text class="font cellTitle" x="724" y="31">Usage evidence</text>
      <text class="font cellCopy" x="724" y="54">Model and cost focus</text>
      <text class="font cellTitle" x="952" y="31">Admin logs</text>
      <text class="font cellCopy" x="952" y="54">User/channel evidence</text>
      <text class="font cellTitle" x="1180" y="31">Dashboard</text>
      <text class="font cellCopy" x="1180" y="54">Logs and quota views</text>
    </g>

    <g transform="translate(0 570)">
      <rect class="rowAlt" x="0" y="0" width="1312" height="78" rx="0 0 28 28"/>
      <text class="font label" x="28" y="32">Production posture</text>
      <text class="font cellCopy" x="28" y="56">How it grows beyond local use</text>
      <text class="font cellTitle" x="352" y="32">Infrastructure-ready</text>
      <text class="font cellCopy" x="352" y="56">Postgres, Redis, K8s, OIDC, OTEL</text>
      <text class="font cellTitle" x="724" y="32">Docker-first</text>
      <text class="font cellCopy" x="724" y="56">Self-hosting + cloud option</text>
      <text class="font cellTitle" x="952" y="32">Simple deploy</text>
      <text class="font cellCopy" x="952" y="56">Binary and Docker-ready</text>
      <text class="font cellTitle" x="1180" y="32">Admin platform</text>
      <text class="font cellCopy" x="1180" y="56">Database + multi-tenant UI</text>
    </g>
  </g>

  <g transform="translate(64 1058)">
    <text class="font fine muted" x="0" y="0">Prior art acknowledged: SiftGate is grateful for the open-source AI gateway ecosystem, including Manifest, One API, New API, and LiteLLM.</text>
  </g>
</svg>
