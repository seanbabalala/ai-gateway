server:
  port: 0
  host: 127.0.0.1
  helmet: true
  body_limit: 1mb
database:
  type: sqlite
  path: ':memory:'
  log_retention_days: 1
auth:
  api_keys: []
  rate_limit:
    requests_per_minute: 1000
    requests_per_minute_ip: 1000
    max_entries: 10000
    login_requests_per_minute: 5
nodes:
  - id: mock-openai
    name: Mock OpenAI
    protocol: chat_completions
    base_url: http://mock-upstream.test
    endpoint: /v1/chat/completions
    embeddings_endpoint: /v1/embeddings
    rerank_endpoint: /v1/rerank
    images_generations_endpoint: /v1/images/generations
    images_edits_endpoint: /v1/images/edits
    audio_transcriptions_endpoint: /v1/audio/transcriptions
    audio_speech_endpoint: /v1/audio/speech
    api_key: mock-openai-key
    models:
      - gpt-4o
      - gpt-4o-mini
    embedding_models:
      - text-embedding-3-small
      - text-embedding-3-large
    rerank_models:
      - rerank-english-v3
    image_models:
      - gpt-image-1
    audio_models:
      - gpt-4o-mini-transcribe
      - tts-1
    timeout_ms: 10000
    tags:
      - code
      - fast
    model_aliases:
      gpt4: gpt-4o
      mini: gpt-4o-mini
    model_capabilities:
      text-embedding-3-small:
        dimensions:
          - 512
          - 1536
        pricing:
          input: 0.02
          output: 0
      text-embedding-3-large:
        dimensions:
          - 1024
          - 3072
        pricing:
          input: 0.13
          output: 0
      rerank-english-v3:
        pricing:
          input: 0.01
          output: 0
  - id: mock-claude
    name: Mock Claude
    protocol: messages
    base_url: http://mock-upstream.test
    endpoint: /v1/messages
    api_key: mock-claude-key
    auth_type: x-api-key
    models:
      - claude-sonnet-4-20250514
    timeout_ms: 10000
    tags:
      - code
      - reasoning
      - math
    model_aliases:
      claude: claude-sonnet-4-20250514
      sonnet: claude-sonnet-4-20250514
    headers:
      anthropic-version: '2023-06-01'
routing:
  tiers:
    simple:
      primary:
        node: mock-openai
        model: gpt-4o-mini
      fallbacks:
        - node: mock-claude
          model: claude-sonnet-4-20250514
    standard:
      primary:
        node: mock-openai
        model: gpt-4o
      fallbacks:
        - node: mock-claude
          model: claude-sonnet-4-20250514
    complex:
      primary:
        node: mock-claude
        model: claude-sonnet-4-20250514
      fallbacks:
        - node: mock-openai
          model: gpt-4o
    reasoning:
      primary:
        node: mock-claude
        model: claude-sonnet-4-20250514
      fallbacks:
        - node: mock-openai
          model: gpt-4o
  scoring:
    simple_max: -0.1
    standard_max: 0.08
    complex_max: 0.35
  domain_preferences:
    frontend:
      - mock-openai
    backend:
      - mock-claude
      - mock-openai
    math:
      - mock-claude
  fallback_policy:
    structured_output:
      enabled: true
      fallback_on_parse_error: true
      fallback_on_schema_error: true
budget:
  daily_token_limit: 5000000
  daily_cost_limit: 50
  alert_threshold: 0.8
models_pricing:
  gpt-4o:
    input: 2.5
    output: 10
  gpt-4o-mini:
    input: 0.15
    output: 0.6
  claude-sonnet-4-20250514:
    input: 3
    output: 15
  text-embedding-3-small:
    input: 0.02
    output: 0
  text-embedding-3-large:
    input: 0.13
    output: 0
  rerank-english-v3:
    input: 0.01
    output: 0
  gpt-image-1:
    input: 5
    output: 0
  gpt-4o-mini-transcribe:
    input: 0.6
    output: 0
  tts-1:
    input: 15
    output: 0
namespaces: []
